<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reliable Hub's</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

/* ================= RESET ================= */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins', sans-serif;
}

body{
    background:#efefef;
    overflow-x:hidden;
    padding-top:100px; /* add space for fixed navbar */
}

/* ================= NAVBAR ================= */

header{
    position: fixed; /* stick navbar */
    width: 100%;
    top: 0;
    left: 0;
    z-index: 1000;
}

.navbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    height:100px;
    padding:0 60px;
    background:rgba(255,255,255,0.85);
    backdrop-filter:blur(8px);
    border-bottom:1px solid rgba(0,0,0,0.05);
    transition: background 0.3s ease, backdrop-filter 0.3s ease;
}

.navbar > div{
    display:flex;
    align-items:center;
    gap:30px;
}

.divider{
    height:100px;
    width:1px;
    background:rgba(0,0,0,0.1);
}

/* LEFT */
.left-nav span{
    font-size:14px;
    letter-spacing:1px;
    cursor:pointer;
}

/* PRODUCT DROPDOWN */
.product{
    position:relative;
    cursor:pointer;
}

.dropdown-menu{
    position:absolute;
    top:100px;
    left:0;
    width:300px;
    background:white;
    padding:25px;
    box-shadow:0 20px 40px rgba(0,0,0,0.08);
    border-radius:8px;
    display:none;
    flex-direction:column;
    gap:15px;
}

.dropdown-menu a{
    text-decoration:none;
    color:#444;
    font-size:14px;
    transition:0.3s;
}

.dropdown-menu a:hover{
    color:#000;
}

.product:hover .dropdown-menu{
    display:flex;
}

/* CENTER LOGO */
.logo{
    position:absolute;
    left:50%;
    transform:translateX(-50%);
    text-align:center;
    z-index:1100;
    pointer-events:none;
}

.logo h1{
    font-size:34px;
    font-weight:600;
}

.logo .green{ color:#1a8f4b; }
.logo .orange{ color:#f28c28; }

.logo p{
    font-size:10px;
    letter-spacing:2px;
    color:#888;
    margin-top:-5px;
}

/* RIGHT */
.right-nav span{
    font-size:18px;
    cursor:pointer;
}

.contact{
    font-size:14px;
    letter-spacing:1px;
    cursor:pointer;
}

/* ================= HERO ================= */

.hero{
    height:85vh;
    background:url("uploads/image.png") center/cover no-repeat;
}

/* ================= QUICK LINKS ================= */

.quick-section{
    padding:90px 80px;
}

.cards{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:60px;
}

.card{
    position:relative;
    overflow:hidden;
    cursor:pointer;
}

.card img{
    width:100%;
    height:420px;
    object-fit:cover;
    transition:0.6s;
}

.overlay{
    position:absolute;
    bottom:0;
    left:0;
    width:100%;
    padding:30px;
    background:linear-gradient(to top, rgba(0,0,0,0.7), transparent);
    color:white;
}

.overlay h3{
    font-weight:500;
    font-size:18px;
}

.card:hover img{
    transform:scale(1.05);
}

/* ================= FULLSCREEN MENU ================= */

.full-menu{
    position:fixed;
    top:0;
    left:-100%;
    width:100%;
    height:100%;
    background:white;
    z-index:2000;
    transition:0.6s ease;
    display:flex;
    justify-content:center;
    align-items:center;
}

.full-menu.active{
    left:0;
}

.full-menu ul{
    list-style:none;
    text-align:center;
}

.full-menu ul li{
    margin:25px 0;
    font-size:32px;
    font-weight:500;
    cursor:pointer;
}

.close-btn{
    position:absolute;
    top:40px;
    right:60px;
    font-size:32px;
    cursor:pointer;
}

/* Responsive */
@media(max-width:1200px){
    .cards{ grid-template-columns:repeat(2,1fr); }
}

@media(max-width:768px){
    .cards{ grid-template-columns:1fr; }
    .navbar{ padding:0 20px; }
}

</style>
</head>

<body>

<header>
    <nav class="navbar">

        <!-- LEFT -->
        <div class="left-nav">
            <span onclick="openMenu()">☰ MENU</span>
            <div class="divider"></div>

            <div class="product">
                <span>PRODUCT</span>
                <div class="dropdown-menu">
                    <a href="#">Warehouse Storage</a>
                    <a href="#">Retail Solutions</a>
                    <a href="#">Data Centre</a>
                    <a href="#">Furniture Solutions</a>
                </div>
            </div>
        </div>

        <!-- LOGO -->
        <div class="logo">
            <h1>Reli<span class="green">A</span>ble <span class="orange">HUB'S</span></h1>
        </div>

        <!-- RIGHT -->
        <div class="right-nav">
            <span>🔍</span>
            <div class="divider"></div>
            <span class="contact">CONTACT US</span>
        </div>

    </nav>
</header>

<!-- HERO -->
<section class="hero"></section>

<!-- QUICK LINKS -->
<section class="quick-section">
    <div class="cards">

        <div class="card">
            <img src="img1.jpg">
            <div class="overlay"><h3>Warehouse Storage Solutions</h3></div>
        </div>

        <div class="card">
            <img src="img2.jpg">
            <div class="overlay"><h3>Retail Solutions</h3></div>
        </div>

        <div class="card">
            <img src="img3.jpg">
            <div class="overlay"><h3>Data Centre</h3></div>
        </div>

        <div class="card">
            <img src="img4.jpg">
            <div class="overlay"><h3>Furniture's</h3></div>
        </div>

    </div>
</section>

<!-- FULLSCREEN MENU -->
<div class="full-menu" id="fullMenu">
    <div class="close-btn" onclick="closeMenu()">✕</div>
    <ul>
        <li>Home</li>
        <li>About Us</li>
        <li>Products</li>
        <li>Projects</li>
        <li>Contact</li>
    </ul>
</div>

<script>
function openMenu(){
    document.getElementById("fullMenu").classList.add("active");
}

function closeMenu(){
    document.getElementById("fullMenu").classList.remove("active");
}

// Navbar scroll effect
const navbar = document.querySelector('.navbar');

window.addEventListener('scroll', () => {
    if(window.scrollY > 50){
        navbar.style.background = 'rgba(255,255,255,0.95)';
        navbar.style.backdropFilter = 'blur(10px)';
    } else {
        navbar.style.background = 'rgba(255,255,255,0.85)';
        navbar.style.backdropFilter = 'blur(8px)';
    }
});
</script>

</body>
</html>
