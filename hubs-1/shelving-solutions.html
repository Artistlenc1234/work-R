<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shelving Solutions</title>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@700;900&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="index.css" rel="stylesheet">
    <link href="navbar.css" rel="stylesheet">
    <link href="solutions.css" rel="stylesheet">
    <link href="footer.css" rel="stylesheet">
</head>
<body>
<div id="navbar-root"></div>

<main class="solutions-page">
    <section class="solutions-hero" style="--hero-image: url('uploads/Layer_1.png');">
        <div>
            <h1>Shelving Solutions</h1>
        </div>
    </section>

    <section class="solutions-grid" aria-label="Shelving system cards">
        <article class="solution-card" id="slotted-angle">
            <img src="uploads/Layer_1-5.png" alt="Slotted Angle Racks" loading="lazy">
            <div class="card-body">
                <h3>Slotted Angle Racks</h3>
                <button class="solution-btn">View More</button>
            </div>
        </article>
        <article class="solution-card" id="boltless">
            <img src="uploads/Layer_1-2.png" alt="Boltless Shelving" loading="lazy">
            <div class="card-body">
                <h3>Boltless Shelving</h3>
                <button class="solution-btn">View More</button>
            </div>
        </article>
        <article class="solution-card" id="longspan">
            <img src="uploads/Layer_1-3.png" alt="Longspan Shelving" loading="lazy">
            <div class="card-body">
                <h3>Longspan Shelving</h3>
                <button class="solution-btn">View More</button>
            </div>
        </article>
        <article class="solution-card" id="carton-live">
            <img src="uploads/Layer_1-4.png" alt="Carton Live Shelving" loading="lazy">
            <div class="card-body">
                <h3>Carton Live Shelving</h3>
                <button class="solution-btn">View More</button>
            </div>
        </article>
    </section>
</main>
<div id="footer-root"></div>

<script src="https://unpkg.com/aos@2.3.1/dist/aos.js" defer></script>
<script src="main.js" defer></script>
</body>
</html>
