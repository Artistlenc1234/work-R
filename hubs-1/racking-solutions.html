<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Racking Solutions</title>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@700;900&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="index.css" rel="stylesheet">
    <link href="navbar.css" rel="stylesheet">
    <link href="solutions.css" rel="stylesheet">
    <link href="footer.css" rel="stylesheet">
</head>
<body>
<div id="navbar-root"></div>

<main class="solutions-page">
    <section class="solutions-hero" style="--hero-image: url('uploads/Rectangle 1.png');">
        <div>
            <h1>Racking Solutions</h1>
        </div>
    </section>

    <section class="solutions-grid" aria-label="Racking system cards">
        <article class="solution-card" id="selective-rack">
            <img src="uploads/Rectangle 2.png" alt="Selective Pallet Racking" loading="lazy">
            <div class="card-body">
                <h3>Selective Pallet Racking</h3>
                <button class="solution-btn">View More</button>
            </div>
        </article>
        <article class="solution-card" id="drive-in">
            <img src="uploads/Rectangle 3.png" alt="Drive-in Racking" loading="lazy">
            <div class="card-body">
                <h3>Drive-in Racking</h3>
                <button class="solution-btn">View More</button>
            </div>
        </article>
        <article class="solution-card" id="pallet-flow">
            <img src="uploads/Rectangle 4.png" alt="Pallet Flow Racking" loading="lazy">
            <div class="card-body">
                <h3>Pallet Flow Racking</h3>
                <button class="solution-btn">View More</button>
            </div>
        </article>
        <article class="solution-card" id="multi-tier">
            <img src="uploads/Layer_1-3.png" alt="Multi-Tier Racking" loading="lazy">
            <div class="card-body">
                <h3>Multi-Tier Racking</h3>
                <button class="solution-btn">View More</button>
            </div>
        </article>
        <article class="solution-card" id="mezzanine">
            <img src="uploads/Layer_1-4.png" alt="Mezzanine Racking" loading="lazy">
            <div class="card-body">
                <h3>Mezzanine Racking</h3>
                <button class="solution-btn">View More</button>
            </div>
        </article>
        <article class="solution-card" id="cantilever">
            <img src="uploads/Layer_1-5.png" alt="Cantilever Racking" loading="lazy">
            <div class="card-body">
                <h3>Cantilever Racking</h3>
                <button class="solution-btn">View More</button>
            </div>
        </article>
    </section>
</main>
<div id="footer-root"></div>

<script src="https://unpkg.com/aos@2.3.1/dist/aos.js" defer></script>
<script src="main.js" defer></script>
</body>
</html>
