<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warehouse Storage Solutions</title>

    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@700;900&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="index.css" rel="stylesheet">
    <link href="navbar.css" rel="stylesheet">
    <link href="solutions.css" rel="stylesheet">
    <link href="footer.css" rel="stylesheet">
</head>
<body>
    <div id="navbar-root"></div>

    <main class="solutions-page">
        <section class="solutions-hero" style="--hero-image: url('uploads/Home Banner 2.png');">
            <div>
                <h1>Warehouse Storage Solutions</h1>
            </div>
        </section>

        <section class="solutions-grid" aria-label="Warehouse Storage sub solutions">
            <article class="solution-card" id="racking-solutions">
                <img src="uploads/Rectangle 1.png" alt="Racking Solutions" loading="lazy">
                <div class="card-body">
                    <h3>Racking Solutions</h3>
                    <button class="solution-btn">View More</button>
                </div>
            </article>
            <article class="solution-card" id="shelving-solutions">
                <img src="uploads/Rectangle 2.png" alt="Shelving Solutions" loading="lazy">
                <div class="card-body">
                    <h3>Shelving Solutions</h3>
                    <button class="solution-btn">View More</button>
                </div>
            </article>
            <article class="solution-card" id="automated-solutions">
                <img src="uploads/Rectangle 3.png" alt="Automated Solutions" loading="lazy">
                <div class="card-body">
                    <h3>Automated Solutions</h3>
                    <button class="solution-btn">View More</button>
                </div>
            </article>
        </section>

    </main>
    <div id="footer-root"></div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js" defer></script>
    <script src="main.js" defer></script>
</body>
</html>
